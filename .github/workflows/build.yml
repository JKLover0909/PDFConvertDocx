name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pdf2docx tkinterdnd2 pyinstaller

      - name: Build EXE
        shell: cmd
        run: |
          python -c "import tkinterdnd2, os; print(os.path.dirname(tkinterdnd2.__file__))" > dnd_path.txt
          set /p DND_PATH=<dnd_path.txt
          pyinstaller --onefile --windowed --name "PDF_to_DOCX" --add-data "%DND_PATH%;tkinterdnd2" converter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PDF_to_DOCX
          path: dist/PDF_to_DOCX.exe

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF_to_DOCX.exe
          generate_release_notes: true
